services:
  db:
    image: postgres:15
    container_name: tfg_db
    environment:
      - POSTGRES_USER=paula
      - POSTGRES_PASSWORD=paula_rg
      - POSTGRES_DB=tfg_game_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paula -d tfg_game_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ../backend
    container_name: tfg_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://paula:paula_rg@db:5432/tfg_game_db
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  proxy:
    image: mitmproxy/mitmproxy:latest
    container_name: tfg_proxy
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ../proxy:/home/mitmproxy/scripts
      - ../reports:/home/mitmproxy/reports
    command: >
      mitmweb
        --mode reverse:http://api:8000
        --listen-host 0.0.0.0
        -p 8080
        --web-host 0.0.0.0
        --web-port 8081
        --set web_password=tfg2026
        -s /home/mitmproxy/scripts/addon.py

volumes:
  db_data: