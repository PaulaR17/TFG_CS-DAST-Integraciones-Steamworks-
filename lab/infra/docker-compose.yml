services:
  db:
    image: postgres:15
    container_name: tfg_db
    environment:
      - POSTGRES_USER=paula
      - POSTGRES_PASSWORD=paula_rg
      - POSTGRES_DB=tfg_game_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: ../backend
    container_name: tfg_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://paula:paula_rg@db:5432/tfg_game_db
    depends_on:
      - db

volumes:
  db_data:
