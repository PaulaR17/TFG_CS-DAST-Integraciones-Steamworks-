services:
  db:
    image: postgres:15
    container_name: tfg_db
    environment:
      - POSTGRES_USER=paula
      - POSTGRES_PASSWORD=paula_rg
      - POSTGRES_DB=tfg_game_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: ../backend
    container_name: tfg_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://paula:paula_rg@db:5432/tfg_game_db
    depends_on:
      - db

  proxy:
    image: mitmproxy/mitmproxy
    container_name: tfg_proxy
    #esto hace que los logs salgan al momento
    environment:
      - PYTHONUNBUFFERED=1
      - MITMPROXY_SET_WEB_AUTH_TOKEN=paula123
    volumes:
      - ../proxy:/home/mitmproxy/scripts
    ports:
      - "8080:8080"
      - "8081:8081"
    #usamos el comando mas directo
    command: >
      mitmweb --web-host 0.0.0.0 
      --web-port 8081 
      --scripts /home/mitmproxy/scripts/addon.py

volumes:
  db_data:
